services:
  agent-api:
    build: .
    container_name: lc4j-coding-agent
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16
    container_name: lc4j-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  workspace:
